<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To get tickets</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #efe6d6 0%, #e3d5bd 50%, #d8c6a6 100%);
    padding: 20px;
  }
  .card {
    background: #fbf6ec;
    border: 1px solid #e0d3ba;
    border-radius: 18px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 16px 44px rgba(120,95,55,0.18);
    text-align: center;
  }
  .lock { font-size: 44px; margin-bottom: 12px; }
  h1 { color: #4a3b25; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .sub { color: #8a7657; font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
  input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid #d8c6a6;
    background: #fffdf8;
    color: #4a3b25;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #b8935a; }
  input::placeholder { color: #b6a888; }
  .btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .unlock-btn { background: #a5824d; color: #fff; }
  .unlock-btn:hover { background: #93713f; }
  .download-btn {
    background: #6f7d52;
    color: #fff;
    display: none;
    text-decoration: none;
  }
  .download-btn:hover { background: #616e47; }
  .err { color: #b5493a; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .success-msg { color: #5f7a3f; font-size: 14px; margin-bottom: 6px; display: none; }
  .hint { color: #b6a888; font-size: 11px; margin-top: 20px; }
  .celebration-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 30;
  }
  .confetti {
    position: absolute;
    top: -10vh;
    width: 8px;
    height: 16px;
    opacity: 0;
    border-radius: 2px;
    animation: confetti-fall 2.8s linear forwards;
  }
  .confetti::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    transform: rotate(45deg);
  }
  .balloon {
    position: absolute;
    bottom: -120px;
    width: 34px;
    height: 44px;
    border-radius: 999px 999px 85% 85%;
    opacity: 0;
    animation: balloon-rise 4.2s ease-in forwards;
  }
  .balloon::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -18px;
    width: 2px;
    height: 20px;
    background: rgba(0,0,0,0.25);
    transform: translateX(-50%);
  }
  @keyframes confetti-fall {
    0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate3d(var(--drift), 110vh, 0) rotate(720deg); opacity: 0; }
  }
  @keyframes balloon-rise {
    0% { transform: translate3d(0, 0, 0) scale(0.95); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translate3d(var(--drift), -110vh, 0) scale(1.08); opacity: 0; }
  }
</style>
</head>

  function check() {
    const val = document.getElementById('pw').value;
    const err = document.getElementById('err');
    const normalized = String(val).trim().toLowerCase();
    const handle = PASSWORD.toLowerCase();

    if (normalized.includes(handle)) {
      const dl = document.getElementById('dl');
      dl.href = "data:application/pdf;base64," + PDF_B64;
      document.getElementById('lockedView').style.display = 'none';
      document.getElementById('unlockedView').style.display = 'block';
      document.getElementById('successMsg').style.display = 'block';
      dl.style.display = 'block';
      document.getElementById('lockIcon').innerHTML = '&#128275;';
      document.getElementById('title').textContent = 'Ticket Unlocked';
      document.getElementById('subtitle').textContent = 'Your ticket is ready to download.';
    } else {
      err.textContent = 'Incorrect password. Try again.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
